<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التحقق</title>

<style>

body{
    font-family:Tahoma;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    width:400px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
    text-align:center;
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    margin-top:20px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-top:20px;
    width:95%;
    padding:12px;
    background:#0078D4;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#005fa3;
}

</style>

</head>

<body>

<div class="box">

<h2>يرجى إدخال اسمك للمتابعة</h2>

<input type="text" id="name" placeholder="اكتب اسمك">

<button onclick="send()">التالي</button>

</div>

<script>

function send(){

let name=document.getElementById("name").value.trim();

if(name===""){
alert("يرجى كتابة الاسم");
return;
}

fetch("https://script.google.com/macros/s/AKfycbz2bMYvAgj1ID9zxyyZowHltaJy-5aTWeMYSwRbmZkQE0neNv6uAC8RcO2_2sGVfGiE4A/exec",{

method:"POST",

body:new URLSearchParams({
name:name
})

})

.then(response=>response.text())

.then(data=>{

window.location.href="awareness.html";

})

.catch(error=>{

alert("حدث خطأ في الإرسال");

});

}

</script>

</body>
</html>
